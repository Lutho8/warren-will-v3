<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#f7f4ee"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Warren Will — Admin · Booking CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --ivory:#f7f4ee; --paper:#fffdf8; --ink:#16130e; --ink2:#4a443a;
  --gold:#a9853e; --gold-soft:#c8ab72; --red:#b04030; --green:#1f8a44;
  --line:rgba(22,19,14,.14); --line-soft:rgba(22,19,14,.07);
  --bebas:'Bebas Neue',sans-serif; --grot:'Space Grotesk',sans-serif; --mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ivory);color:var(--ink);font-family:var(--grot);font-weight:300;min-height:100svh}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer}

/* ── topbar ── */
#top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;
  padding:12px 20px;background:rgba(255,253,248,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:32px;height:32px;background:var(--gold);display:grid;place-items:center;font-family:var(--bebas);font-size:15px;color:#fffdf8}
.logo .name{font-family:var(--bebas);font-size:18px;letter-spacing:.16em}
.badge{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#fffdf8;background:var(--ink);
  padding:4px 9px;border-radius:100px}
#genAt{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--ink2);letter-spacing:.08em;display:none}
.tbtn{border:1px solid var(--line);background:var(--paper);border-radius:100px;padding:8px 14px;
  font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);transition:.2s}
.tbtn:hover{border-color:var(--gold);color:var(--gold)}
#topBtns{display:none;gap:8px;margin-left:auto}
@media(max-width:640px){#genAt{display:none!important}}

/* ── gate ── */
#gate{min-height:calc(100svh - 57px);display:grid;place-items:center;padding:24px}
.gate-card{width:100%;max-width:380px;background:var(--paper);border:1px solid var(--line-soft);border-radius:22px;
  padding:38px 30px;text-align:center;box-shadow:0 26px 70px -34px rgba(120,90,40,.3)}
.gate-card .mark{width:52px;height:52px;background:var(--gold);display:grid;place-items:center;margin:0 auto 16px;
  font-family:var(--bebas);font-size:24px;color:#fffdf8;border-radius:14px}
.gate-card h1{font-family:var(--bebas);font-weight:400;font-size:30px;letter-spacing:.04em}
.gate-card p{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink2);margin:8px 0 22px}
.gate-card input{width:100%;background:var(--ivory);border:1px solid var(--line);border-radius:14px;padding:15px 16px;
  font-family:var(--mono);font-size:14px;color:var(--ink);outline:none;text-align:center;letter-spacing:.1em}
.gate-card input:focus{border-color:var(--gold)}
.gate-card button{width:100%;margin-top:12px;background:var(--gold);color:#fffdf8;border:1px solid var(--gold);border-radius:100px;
  padding:15px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;transition:.2s}
.gate-card button:hover{background:var(--ink);border-color:var(--ink)}
.gate-err{display:none;margin-top:12px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--red);text-transform:uppercase}
.gate-card.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* ── dashboard ── */
#dash{display:none;padding:22px 20px calc(40px + env(safe-area-inset-bottom));max-width:1180px;margin:0 auto}
.wf{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.wf span{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);
  border:1px solid var(--line);background:var(--paper);border-radius:100px;padding:6px 11px}
.wf span.hot{border-color:var(--gold);color:var(--gold)}
.wf i{color:var(--gold);font-style:normal;font-family:var(--mono);font-size:9px}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--paper);border:1px solid var(--line-soft);border-radius:18px;padding:18px 16px}
.kpi .n{font-family:var(--bebas);font-size:40px;line-height:1;color:var(--ink)}
.kpi .l{font-family:var(--mono);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink2);margin-top:6px}
.kpi.hot{border-color:var(--gold)}
.kpi.hot .n{color:var(--gold)}
.kpi.alert{border-color:var(--red)}
.kpi.alert .n{color:var(--red)}

h2{font-family:var(--bebas);font-weight:400;font-size:26px;letter-spacing:.04em;margin:26px 0 12px;
  display:flex;align-items:baseline;gap:10px;border-bottom:1px solid var(--line);padding-bottom:10px}
h2 .cnt{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:.14em}
.empty{font-family:var(--mono);font-size:10px;color:var(--ink2);letter-spacing:.1em;padding:16px 4px}

.card{background:var(--paper);border:1px solid var(--line-soft);border-radius:16px;padding:16px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.row .who{font-weight:500;font-size:14px}
.row .sub{font-family:var(--mono);font-size:9px;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase}
.chip{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;border-radius:100px;padding:4px 10px;border:1px solid var(--line);color:var(--ink2)}
.chip.gold{border-color:var(--gold);color:var(--gold)}
.chip.wa{border-color:#2ea84f;color:var(--green)}
.chip.red{border-color:var(--red);color:var(--red)}
.chip.solid{background:var(--gold);border-color:var(--gold);color:#fffdf8}
.acts{margin-left:auto;display:flex;gap:8px}
.act{display:inline-flex;align-items:center;gap:6px;border-radius:100px;padding:8px 13px;
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);transition:.2s}
.act:hover{background:var(--gold);color:#fffdf8}
.act.wa{border-color:#2ea84f;color:var(--green)}
.act.wa:hover{background:var(--green);color:#fff}
.meta{font-family:var(--mono);font-size:9px;color:var(--ink2);letter-spacing:.08em;margin-top:8px;line-height:1.8}
.due{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.due.over{color:var(--red);font-weight:700}
.due.soon{color:var(--gold)}

.pipe-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.stage{min-width:230px;flex:1;background:var(--paper);border:1px solid var(--line-soft);border-radius:16px;padding:12px}
.stage h3{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink2);
  display:flex;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(--line-soft);margin-bottom:10px}
.stage h3 b{color:var(--gold);font-weight:400}
.opp{border:1px solid var(--line-soft);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:var(--ivory)}
.opp .who{font-weight:500;font-size:13px}
.opp .meta{margin-top:4px}
@media(max-width:700px){.stage{min-width:250px}}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 22px}
@media(max-width:860px){.grid2{grid-template-columns:1fr}}

#err{display:none;background:#fdf0ee;border:1px solid var(--red);color:var(--red);border-radius:14px;
  padding:14px 16px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;margin-bottom:16px}
</style>
</head>
<body>

<div id="top">
  <a class="logo" href="index.html"><span class="mark">WW</span><span class="name">ADMIN</span></a>
  <span class="badge">Booking CRM</span>
  <span id="genAt"></span>
  <div id="topBtns">
    <button class="tbtn" id="btnRefresh" type="button">↻ Refresh</button>
    <button class="tbtn" id="btnLogout" type="button">Log out</button>
  </div>
</div>

<!-- ── passphrase gate ── -->
<div id="gate">
  <form class="gate-card" id="gateForm">
    <div class="mark">WW</div>
    <h1>BOOKING CRM</h1>
    <p>Warren Will · team access only</p>
    <input type="password" id="gateKey" placeholder="Passphrase" autocomplete="current-password" autofocus/>
    <button type="submit" id="gateBtn">Open dashboard →</button>
    <p class="gate-err" id="gateErr">Wrong passphrase — try again</p>
  </form>
</div>

<!-- ── dashboard ── -->
<main id="dash">
  <div id="err"></div>

  <div class="wf" aria-label="Booking workflow">
    <span class="hot">Follow-up loop</span>
    <span>New</span><i>→</i><span>Contacted</span><i>→</i><span>Replied</span><i>→</i><span>Negotiating</span><i>→</i><span>Confirmed · 50% deposit</span><i>→</i><span>Played</span><i>→</i><span>Rebook</span>
  </div>

  <div class="kpis" id="kpis"></div>

  <h2>FOLLOW-UP QUEUE <span class="cnt" id="fqCnt"></span></h2>
  <div id="followups"></div>

  <h2>BOOKINGS PIPELINE <span class="cnt" id="ppCnt"></span></h2>
  <div class="pipe-scroll" id="pipeline"></div>

  <div class="grid2">
    <div>
      <h2>WHATSAPP CONTACTS <span class="cnt" id="waCnt"></span></h2>
      <div id="whatsapp"></div>
    </div>
    <div>
      <h2>INNER CIRCLE <span class="cnt" id="icCnt"></span></h2>
      <div id="inner"></div>
    </div>
  </div>

  <h2>UPCOMING GIGS <span class="cnt" id="gigCnt"></span></h2>
  <div id="gigs"></div>

  <h2>RECENT ACTIVITY</h2>
  <div id="interactions"></div>
</main>

<script>
const EP = 'https://tqwaepvdsvyyfgtlurkm.supabase.co/functions/v1/crm-dashboard';
const SK = 'wwAdminKey';
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const digits = s => String(s ?? '').replace(/\D/g, '');
const todo = s => !s || /TODO/i.test(String(s));
const fmtD = d => { if(!d) return '—'; const t = new Date(d); return isNaN(t) ? '—' : t.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }); };
const fmtDT = d => { if(!d) return '—'; const t = new Date(d); return isNaN(t) ? '—' : t.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }) + ' ' + t.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }); };
function dueMeta(due){
  if(!due) return { cls:'', label:'no date' };
  const now = Date.now(), t = new Date(due).getTime();
  const days = Math.ceil((t - now) / 86400000);
  if(days < 0)  return { cls:'over', label:'OVERDUE ' + Math.abs(days) + 'd · ' + fmtDT(due) };
  if(days === 0) return { cls:'over', label:'DUE TODAY · ' + fmtDT(due) };
  if(days === 1) return { cls:'soon', label:'due tomorrow · ' + fmtDT(due) };
  if(days <= 3)  return { cls:'soon', label:'due in ' + days + 'd · ' + fmtD(due) };
  return { cls:'', label:'due in ' + days + 'd · ' + fmtD(due) };
}
function contactActs(c){
  c = c || {};
  const ph = digits(c.phone_whatsapp), em = String(c.email || '');
  let h = '';
  if(ph.length >= 7) h += `<a class="act wa" href="https://wa.me/${ph}" target="_blank" rel="noopener">WhatsApp →</a>`;
  if(em && !todo(em) && em.includes('@')) h += `<a class="act" href="mailto:${esc(em)}">Email →</a>`;
  return h ? `<div class="acts">${h}</div>` : '';
}

let KEY = sessionStorage.getItem(SK) || '';

async function load(){
  $('gateErr').style.display = 'none';
  let r;
  try{ r = await fetch(EP, { headers: { 'x-admin-key': KEY } }); }
  catch(_){ $('err').style.display = 'block'; $('err').textContent = 'Network error — could not reach the CRM. Check connection and refresh.'; return; }
  if(r.status === 401){
    sessionStorage.removeItem(SK); KEY = '';
    $('dash').style.display = 'none'; $('topBtns').style.display = 'none';
    $('gate').style.display = 'grid';
    $('gateErr').style.display = 'block';
    const gc = document.querySelector('.gate-card'); gc.classList.remove('shake'); void gc.offsetWidth; gc.classList.add('shake');
    return;
  }
  const d = await r.json();
  if(!d.ok){ $('err').style.display = 'block'; $('err').textContent = 'CRM error: ' + (d.error || 'unknown'); return; }
  sessionStorage.setItem(SK, KEY);
  $('gate').style.display = 'none';
  $('dash').style.display = 'block';
  $('topBtns').style.display = 'flex';
  $('genAt').style.display = 'inline';
  $('genAt').textContent = 'updated ' + fmtDT(d.generated_at);
  render(d);
}

function render(d){
  const c = d.counts || {}, p = c.pipeline || {};
  const active = (p.new||0)+(p.contacted||0)+(p.replied||0)+(p.negotiating||0);
  $('kpis').innerHTML = [
    { n: c.followups_due ?? 0, l: 'Follow-ups due', cls: (c.followups_due|0) > 0 ? 'alert' : '' },
    { n: active, l: 'Active opportunities', cls: active > 0 ? 'hot' : '' },
    { n: c.booking_leads ?? 0, l: 'Booking leads' },
    { n: c.whatsapp_contacts ?? 0, l: 'WhatsApp contacts' },
    { n: c.inner_circle ?? 0, l: 'Inner circle' },
    { n: c.gigs_upcoming ?? 0, l: 'Upcoming gigs', cls: 'hot' },
    { n: c.venues_total ?? 0, l: 'Venues in CRM' },
    { n: c.contacts_total ?? 0, l: 'Contacts total' },
  ].map(k => `<div class="kpi ${k.cls}"><div class="n">${k.n}</div><div class="l">${k.l}</div></div>`).join('');

  /* follow-up queue */
  const fq = d.followup_queue || [];
  $('fqCnt').textContent = fq.length + ' pending';
  $('followups').innerHTML = fq.length ? fq.map(s => {
    const dm = dueMeta(s.due_at), ct = s.contacts || {}, op = s.opportunities || {};
    const wa = s.channel === 'whatsapp';
    return `<div class="card"><div class="row">
      <span class="chip ${wa ? 'wa' : 'gold'}">${wa ? 'WhatsApp' : esc(s.channel || 'email')}</span>
      <div><div class="who">${esc(ct.name || '—')}</div><div class="sub">step ${esc(s.step)} · ${esc(op.type || '')} · stage: ${esc(op.stage || '')}</div></div>
      ${contactActs(ct)}
    </div><div class="meta"><span class="due ${dm.cls}">${dm.label}</span>${todo(ct.phone_whatsapp) && wa ? ' · ⚠ phone number still needed' : ''}${todo(ct.email) && !wa ? ' · ⚠ email still needed' : ''}</div></div>`;
  }).join('') : '<p class="empty">Nothing pending — the loop is clear. ✓</p>';

  /* pipeline by stage */
  const stages = ['new','contacted','replied','negotiating','confirmed','played','rebook','lost'];
  const ops = d.pipeline || [];
  $('ppCnt').textContent = ops.length + ' total';
  $('pipeline').innerHTML = stages.map(st => {
    const list = ops.filter(o => o.stage === st);
    return `<div class="stage"><h3>${st} <b>${list.length}</b></h3>` +
      (list.length ? list.map(o => {
        const ct = o.contacts || {}, vn = o.venues || {};
        return `<div class="opp"><div class="who">${esc(ct.name || '—')}</div>
          <div class="meta">${esc(o.type || '')}${vn.name ? ' · ' + esc(vn.name) + (vn.city ? ' (' + esc(vn.city) + ')' : '') : ''}${o.fee_quote ? ' · €' + esc(o.fee_quote) : ''}<br>touch: ${fmtD(o.last_touch)}${o.next_follow_up ? ' · next: ' + fmtD(o.next_follow_up) : ''}</div></div>`;
      }).join('') : '<p class="empty" style="padding:6px 2px">—</p>') + `</div>`;
  }).join('');

  /* whatsapp contacts */
  const waList = (d.contacts || []).filter(x => digits(x.phone_whatsapp).length >= 7 || x.preferred_channel === 'whatsapp');
  $('waCnt').textContent = waList.length;
  $('whatsapp').innerHTML = waList.length ? waList.map(x => `<div class="card"><div class="row">
    <span class="chip wa">WA</span>
    <div><div class="who">${esc(x.name)}</div><div class="sub">${esc(x.role || '')} · ${esc(x.status || '')}${todo(x.phone_whatsapp) ? ' · ⚠ number needed' : ''}</div></div>
    ${contactActs(x)}
  </div></div>`).join('') : '<p class="empty">No WhatsApp contacts yet.</p>';

  /* inner circle */
  const ic = d.inner_circle || [];
  $('icCnt').textContent = ic.length;
  $('inner').innerHTML = ic.length ? ic.map(x => `<div class="card"><div class="row">
    <span class="chip gold">${esc(x.role || '—')}</span>
    <div><div class="who">${esc(x.name)}</div><div class="sub">${esc(x.preferred_channel || '')}${x.instagram && !todo(x.instagram) ? ' · ' + esc(x.instagram) : ''}</div></div>
    ${contactActs(x)}
  </div></div>`).join('') : '<p class="empty">No inner-circle contacts yet.</p>';

  /* gigs */
  const g = d.gigs || [];
  $('gigCnt').textContent = g.length;
  $('gigs').innerHTML = g.length ? g.map(x => {
    const vn = x.venues || {};
    return `<div class="card"><div class="row">
      <span class="chip solid">${fmtD(x.date)}</span>
      <div><div class="who">${esc(vn.name || 'Venue TBC')}</div><div class="sub">${esc(vn.city || '')}${x.package ? ' · ' + esc(x.package) : ''}${x.set_length ? ' · ' + esc(x.set_length) : ''}</div></div>
      <div class="acts">${x.fee ? `<span class="chip gold">€${esc(x.fee)}</span>` : ''}${x.deposit_received ? '<span class="chip wa">deposit ✓</span>' : '<span class="chip red">deposit open</span>'}</div>
    </div></div>`;
  }).join('') : '<p class="empty">No upcoming gigs on record.</p>';

  /* interactions */
  const ia = d.interactions || [];
  $('interactions').innerHTML = ia.length ? ia.map(x => `<div class="card"><div class="row">
    <span class="chip ${x.channel === 'whatsapp' ? 'wa' : ''}">${esc(x.channel || '—')}</span>
    <div><div class="who">${esc((x.contacts || {}).name || '—')} <span class="sub">${esc(x.direction || '')}</span></div>
    <div class="sub">${esc(x.summary || '')}</div></div>
    <div class="acts"><span class="chip">${fmtDT(x.created_at)}</span></div>
  </div></div>`).join('') : '<p class="empty">No interactions logged yet.</p>';
}

/* gate + topbar events */
$('gateForm').addEventListener('submit', e => {
  e.preventDefault();
  KEY = $('gateKey').value.trim();
  if(!KEY) return;
  $('gateBtn').textContent = 'Opening…';
  load().finally(() => { $('gateBtn').textContent = 'Open dashboard →'; });
});
$('btnRefresh').addEventListener('click', load);
$('btnLogout').addEventListener('click', () => { sessionStorage.removeItem(SK); KEY = ''; location.reload(); });

/* auto-login if key stored */
if(KEY){ load(); }
</script>
</body>
</html>
